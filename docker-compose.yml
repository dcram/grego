services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: grego
      POSTGRES_PASSWORD: grego
      POSTGRES_DB: grego
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    environment:
      GREGO_DATABASE_URL: postgresql://grego:grego@db:5432/grego
    ports:
      - "8000:8000"
    depends_on:
      - db

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
